<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Pokemon Card Shader</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #0a0a0f;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      html, body {
        overscroll-behavior: none;
      }

      #unity-canvas {
        touch-action: none;
      }

      /* ── Loading ekranı ── */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        z-index: 100;
        transition: opacity 0.6s ease;
      }

      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #loading-gif {
        width: 180px;
        height: 180px;
        object-fit: contain;
        animation: float 2.5s ease-in-out infinite;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-12px); }
      }

      #loading-text {
        color: #cccccc;
        font-family: sans-serif;
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        opacity: 0.7;
      }

      #progress-bar-wrap {
        width: 220px;
        height: 4px;
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
        overflow: hidden;
      }

      #progress-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #6ec6ff, #a78bfa);
        border-radius: 2px;
        transition: width 0.3s ease;
      }
    </style>
  </head>
  <body>

    <!-- Loading ekranı -->
    <div id="loading-screen">
      <img id="loading-gif" src="eevee.gif" alt="Loading...">
      <div id="loading-text">Yükleniyor...</div>
      <div id="progress-bar-wrap">
        <div id="progress-bar-fill"></div>
      </div>
    </div>

    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1920 height=1080 tabindex="-1"></canvas>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">shader</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      // Dokunuşun tarayıcı tarafından scroll/zoom/pull-to-refresh olarak
      // yorumlanmasını engeller - Unity'nin kendi touch input'u devreye girer.
      canvas.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
      canvas.addEventListener('touchmove',  function(e) { e.preventDefault(); }, { passive: false });
      canvas.addEventListener('touchend',   function(e) { e.preventDefault(); }, { passive: false });

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/pokemon_shader.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/pokemon_shader.data.br",
        frameworkUrl: buildUrl + "/pokemon_shader.framework.js.br",
        codeUrl: buildUrl + "/pokemon_shader.wasm.br",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "shader",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "1920px";
        canvas.style.height = "1080px";
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#progress-bar-fill").style.width = (100 * progress) + "%";
        }).then((unityInstance) => {
          var loadingScreen = document.querySelector("#loading-screen");
          loadingScreen.classList.add("hidden");
          setTimeout(function() { loadingScreen.style.display = "none"; }, 650);

          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);

    </script>
  </body>
</html>

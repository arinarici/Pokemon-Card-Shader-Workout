<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Pokemon Card Shader</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #0a0a0f;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      /* ── Landscape uyarısı (portrait modda gösterilir) ── */
      #rotate-message {
        display: none;
        position: fixed;
        inset: 0;
        background: #0a0a0f;
        color: #fff;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 9999;
        font-family: sans-serif;
        font-size: 18px;
        text-align: center;
      }

      #rotate-message svg {
        width: 60px;
        height: 60px;
        animation: rotateIcon 2s ease-in-out infinite;
      }

      @keyframes rotateIcon {
        0%   { transform: rotate(0deg); }
        40%  { transform: rotate(90deg); }
        100% { transform: rotate(90deg); }
      }

      @media screen and (orientation: portrait) and (max-width: 1024px) {
        #rotate-message { display: flex; }
        #unity-container { display: none; }
      }

      /* ── Unity container ── */
      #unity-container {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0f;
      }

      #unity-canvas {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      /* ── Loading ekranı ── */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        z-index: 100;
        transition: opacity 0.6s ease;
      }

      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #loading-gif {
        width: 180px;
        height: 180px;
        object-fit: contain;
        /* Hafif yukarı-aşağı sallanma */
        animation: float 2.5s ease-in-out infinite;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-12px); }
      }

      #loading-text {
        color: #cccccc;
        font-family: sans-serif;
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        opacity: 0.7;
      }

      /* Progress bar */
      #progress-bar-wrap {
        width: 220px;
        height: 4px;
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
        overflow: hidden;
      }

      #progress-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #6ec6ff, #a78bfa);
        border-radius: 2px;
        transition: width 0.3s ease;
      }

      /* Unity warning banner */
      #unity-warning {
        position: fixed;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 200;
      }

      /* Fullscreen butonu */
      #unity-footer {
        position: fixed;
        bottom: 10px;
        right: 14px;
        z-index: 50;
      }

      #unity-fullscreen-button {
        width: 38px;
        height: 38px;
        background: rgba(255,255,255,0.12) url('TemplateData/fullscreen-button.png') center/20px no-repeat;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      #unity-fullscreen-button:hover {
        background-color: rgba(255,255,255,0.22);
      }
    </style>
  </head>
  <body>

    <!-- Landscape uyarısı -->
    <div id="rotate-message">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
        <rect x="4" y="2" width="10" height="16" rx="2"/>
        <path d="M17 8l3 3-3 3"/>
        <line x1="14" y1="11" x2="20" y2="11"/>
      </svg>
      <span>Lütfen cihazınızı<br>yatay çevirin</span>
    </div>

    <!-- Loading ekranı -->
    <div id="loading-screen">
      <img id="loading-gif" src="eevee.gif" alt="Loading...">
      <div id="loading-text">Yükleniyor...</div>
      <div id="progress-bar-wrap">
        <div id="progress-bar-fill"></div>
      </div>
    </div>

    <!-- Unity -->
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-warning"></div>
      <div id="unity-footer">
        <div id="unity-fullscreen-button"></div>
      </div>
    </div>

    <script>
      // ── Landscape kilit (destekleyen tarayıcılarda) ──
      function lockLandscape() {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(function() {});
        }
      }
      document.addEventListener('click', lockLandscape, { once: true });
      lockLandscape();

      // ── Unity kurulumu ──
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/pokemon_shader.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/pokemon_shader.data",
        frameworkUrl: buildUrl + "/pokemon_shader.framework.js",
        codeUrl: buildUrl + "/pokemon_shader.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "shader",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
      };

      // Mobil: tam ekran canvas
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.head.appendChild(meta);
      } else {
        // Desktop: pencere boyutunu doldur
        canvas.style.width  = "100vw";
        canvas.style.height = "100vh";
      }

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#progress-bar-fill").style.width = (100 * progress) + "%";
        }).then((unityInstance) => {
          // Loading ekranını yumuşakça kapat
          var loadingScreen = document.querySelector("#loading-screen");
          loadingScreen.classList.add("hidden");
          setTimeout(function() { loadingScreen.style.display = "none"; }, 650);

          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
